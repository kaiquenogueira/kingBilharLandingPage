# Docker Compose otimizado para EasyPanel
# Use este arquivo para deploy no EasyPanel

services:
  # Opção 1: Full-Stack (Recomendado para EasyPanel)
  app:
    build:
      context: .
      dockerfile: Dockerfile.fullstack
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

