version: '3.8'

services:
  # Frontend-only deployment (current setup)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Full-stack deployment (frontend + backend)
  fullstack:
    build:
      context: .
      dockerfile: Dockerfile.fullstack
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend-only deployment (for microservices architecture)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: kingbilhar-network